# QQ智能助手 - Docker Compose（2x3090 各~15G可用显存）
# 适配策略：单 vLLM 实例 + AWQ 4bit 量化模型

version: "3.8"

volumes:
  models:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/models
  loras:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/loras
  data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/app
  nginx_logs:


services:
  # ============================================
  # vLLM 推理服务（单实例 + AWQ量化，GPU 0）
  # 显存占用：模型 ~4.5G + KV Cache ~3G = ~7.5G（15G内充足）
  # ============================================
  vllm:
    image: vllm/vllm-openai:v0.10.2
    container_name: qq-assistant-vllm
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - models:/models:ro
      - loras:/loras:ro
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - VLLM_ALLOW_RUNTIME_LORA_UPDATING=True
    command: >
      --model /models/Qwen2.5-7B-Instruct-AWQ
      --served-model-name qwen2.5-7b-awq
      --quantization awq_marlin
      --enable-lora
      --max-loras 4
      --max-lora-rank 64
      --gpu-memory-utilization 0.5
      --max-model-len 4096
      --dtype float16
      --tensor-parallel-size 1
      --host 0.0.0.0
      --port 8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - qq-assistant-net

  # ============================================
  # FastAPI 后端
  # ============================================
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: qq-assistant-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - data:/app/data
      - loras:/app/loras
      - models:/app/models:ro
    environment:
      - VLLM_BASE_URLS=http://vllm:8000
      - VLLM_SERVED_MODEL_NAME=qwen2.5-7b-awq
      - VLLM_LORA_ROOT=/loras
      - BACKEND_WORKERS=1
      - VLLM_TIMEOUT=120
      - VLLM_MAX_RETRIES=3
      - DATABASE_PATH=/app/data/qq_assistant.db
      - VECTOR_DB_PATH=/app/data/vector_db
      - LORA_PATH=/app/loras
      - MODEL_PATH=/app/models
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=http://localhost:5000,http://localhost:80
    depends_on:
      vllm:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - qq-assistant-net

  # ============================================
  # Next.js 前端
  # ============================================
  frontend:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api
    container_name: qq-assistant-frontend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - BACKEND_URL=http://backend:8000
      - PORT=5000
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - qq-assistant-net

  # ============================================
  # Nginx 反向代理
  # ============================================
  nginx:
    image: nginx:1.25-alpine
    container_name: qq-assistant-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - vllm
      - backend
      - frontend
    networks:
      - qq-assistant-net

networks:
  qq-assistant-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
