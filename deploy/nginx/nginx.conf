# QQ智能助手 - Nginx 负载均衡配置
# vLLM 双实例 + 前后端反向代理

# ============================================
# 自定义日志格式（包含耗时和上游响应时间）
# ============================================
log_format main_with_timing '$remote_addr - $remote_user [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            '"$http_referer" "$http_user_agent" '
                            'rt=$request_time uct=$upstream_connect_time '
                            'uht=$upstream_header_time urt=$upstream_response_time '
                            'upstream=$upstream_addr';

# ============================================
# 上游服务定义
# ============================================

# vLLM 推理服务
upstream vllm_backend {
    server vllm:8001 max_fails=3 fail_timeout=30s;

    # 长连接支持
    keepalive 32;
}

# FastAPI 后端服务
upstream fastapi_backend {
    server backend:8000 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# Next.js 前端服务
upstream nextjs_frontend {
    server frontend:5000 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# ============================================
# HTTP -> HTTPS 重定向
# ============================================
server {
    listen 80;
    server_name _;

    # 健康检查端点（HTTP仍可访问）
    location /health {
        proxy_pass http://fastapi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 其余请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================
# HTTPS 主服务
# ============================================
server {
    # HTTPS 配置（请自行配置证书路径）
    # listen 443 ssl http2;
    # ssl_certificate     /etc/nginx/ssl/cert.pem;
    # ssl_certificate_key /etc/nginx/ssl/key.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 10m;

    # 开发环境直接监听 80 端口（生产环境请切换到上方 HTTPS 配置）
    listen 80;
    server_name _;

    # 请求体大小限制（支持知识库文档上传）
    client_max_body_size 10m;

    # 访问日志
    access_log /var/log/nginx/access.log main_with_timing;
    error_log  /var/log/nginx/error.log warn;

    # ========================================
    # Gzip 压缩
    # ========================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.api+json
        font/opentype
        font/ttf
        image/svg+xml;

    # ========================================
    # 安全头
    # ========================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' http://localhost:* ws://localhost:*;" always;

    # ========================================
    # vLLM 推理 API 负载均衡代理
    # ========================================
    location /v1/ {
        proxy_pass http://vllm_backend;
        proxy_http_version 1.1;

        # 流式响应支持（SSE）
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_set_header Transfer-Encoding '';

        # SSE 相关头
        proxy_set_header Accept-Encoding '';

        # 超时配置（推理需要较长时间）
        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # 请求头透传
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 长连接
        proxy_set_header Connection "";
    }

    # ========================================
    # FastAPI 后端 API 代理
    # ========================================
    location /api/ {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;

        # 流式响应支持（生成接口可能使用 SSE）
        proxy_buffering off;
        proxy_cache off;

        # 超时配置
        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # 请求头透传
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # 后端健康检查
    location /health {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
    }

    # ========================================
    # Next.js 前端代理
    # ========================================
    location / {
        proxy_pass http://nextjs_frontend;
        proxy_http_version 1.1;

        # 超时配置
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 请求头透传
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";
    }

    # Next.js HMR WebSocket（开发模式）
    location /_next/webpack-hmr {
        proxy_pass http://nextjs_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # ========================================
    # 静态文件缓存（Next.js 构建产物）
    # ========================================
    location /_next/static/ {
        proxy_pass http://nextjs_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # 长期缓存（Next.js 构建产物包含 hash）
        expires 365d;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # 图片等静态资源缓存
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        proxy_pass http://nextjs_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        expires 30d;
        add_header Cache-Control "public, no-transform";
        add_header X-Content-Type-Options "nosniff" always;
    }
}
