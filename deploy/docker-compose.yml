services:
  # PostgreSQL + pgvector
  postgres:
    image: pgvector/pgvector:pg14
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-qqassistant}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-changeme}
      POSTGRES_DB: ${PG_DATABASE:-qqassistant}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-qqassistant}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # Redis
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 512mb --maxmemory-policy volatile-lru
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # vLLM Inference Engine (RTX 3090 优化配置 - Qwen2.5-7B-Instruct FP16)
  vllm:
    image: vllm/vllm-openai:v0.7.2
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      --model /models/Qwen2.5-7B-Instruct
      --enable-lora
      --max-loras 4
      --max-lora-rank 64
      --gpu-memory-utilization 0.90
      --max-model-len 4096
      --dtype float16
      --host 0.0.0.0
      --port 8001
      --lora-modules-dir /loras
    volumes:
      - /root/autodl-tmp/Qwen2.5-7B-Instruct:/models/Qwen2.5-7B-Instruct
      - /root/autodl-tmp/qqchat-enhanced/backend/loras:/loras
    ports:
      - "8001:8001"
    networks:
      - internal

  # FastAPI Backend
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      USE_POSTGRESQL: "true"
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-qqassistant}
      PG_PASSWORD: ${PG_PASSWORD:-changeme}
      PG_DATABASE: ${PG_DATABASE:-qqassistant}
      REDIS_URL: redis://redis:6379/0
      VLLM_ENABLED: "true"
      VLLM_BASE_URL: http://vllm:8001
    volumes:
      - ../backend/knowledge_bases:/app/knowledge_bases
      - ../backend/loras:/app/loras
    ports:
      - "8000:8000"
    networks:
      - internal

  # Next.js Frontend
  frontend:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "5000:5000"
    networks:
      - internal

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - internal

volumes:
  pgdata:
  redisdata:

networks:
  internal:
    driver: bridge
