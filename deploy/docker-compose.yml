services:
  # PostgreSQL + pgvector
  postgres:
    image: pgvector/pgvector:pg14
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-qqassistant}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?set PG_PASSWORD}
      POSTGRES_DB: ${PG_DATABASE:-qqassistant}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-qqassistant}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # Redis
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 512mb --maxmemory-policy volatile-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # vLLM Inference Engine
  vllm:
    image: vllm/vllm-openai:v0.10.2
    restart: unless-stopped
    environment:
      VLLM_ALLOW_RUNTIME_LORA_UPDATING: "True"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      --model /models/Qwen3-8B-Instruct-AWQ
      --served-model-name qwen3-8b-instruct-awq
      --quantization awq_marlin
      --enable-lora
      --max-loras 4
      --max-lora-rank 64
      --gpu-memory-utilization 0.82
      --max-model-len 4096
      --dtype float16
      --host 0.0.0.0
      --port 8001
    volumes:
      - ./data/models/Qwen3-8B-Instruct-AWQ:/models/Qwen3-8B-Instruct-AWQ
      - ./data/loras:/loras
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - internal

  # FastAPI Backend
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        INSTALL_GPU_DEPS: "false"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vllm:
        condition: service_healthy
    environment:
      USE_POSTGRESQL: "true"
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-qqassistant}
      PG_PASSWORD: ${PG_PASSWORD:?set PG_PASSWORD}
      PG_DATABASE: ${PG_DATABASE:-qqassistant}
      DATABASE_URL: postgresql+asyncpg://${PG_USER:-qqassistant}:${PG_PASSWORD:?set PG_PASSWORD}@postgres:5432/${PG_DATABASE:-qqassistant}
      REDIS_URL: redis://redis:6379/0
      VLLM_ENABLED: "true"
      MODEL_PROVIDER: vllm
      VLLM_BASE_URL: http://vllm:8001
      VLLM_BASE_URLS: http://vllm:8001
      VLLM_SERVED_MODEL_NAME: qwen3-8b-instruct-awq
      VLLM_LORA_ROOT: /loras
      LORA_PATH: /app/loras
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ASTRBOT_INTEGRATION_TOKEN: ${ASTRBOT_INTEGRATION_TOKEN:?set ASTRBOT_INTEGRATION_TOKEN}
      QQCHAT_BACKEND_URL: http://backend:8000
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?set ALLOWED_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      BACKEND_WORKERS: "1"
      CLAW_CODE_EXECUTION_ENABLED: "false"
    volumes:
      - backend_data:/app/data
      - ./data/knowledge_bases:/app/knowledge_bases
      - ./data/loras:/app/loras
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready', timeout=8)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 150s
    networks:
      - internal

  # Next.js Frontend
  frontend:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_URL: http://backend:8000
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - internal

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal

volumes:
  pgdata:
  redisdata:
  backend_data:

networks:
  internal:
    driver: bridge
