name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Frontend checks
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm ts-check
      - run: pnpm lint
      - run: pnpm audit --prod --registry=https://registry.npmjs.org
      - run: pnpm build

  # Backend checks
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install CPU-only dependencies
        run: |
          python -m pip install --upgrade pip
          # Install PyTorch CPU version first (CI has no GPU)
          pip install torch torchvision torchaudio \
            --index-url https://download.pytorch.org/whl/cpu
          # Install remaining deps (skip GPU-only vllm and torch variants)
          grep -v -E "^(vllm|torch|torchvision|torchaudio)" requirements.txt > requirements-ci.txt
          pip install -r requirements-ci.txt
      - name: Syntax and dependency checks
        run: |
          python -m compileall -q . ../scripts ../astrbot_plugins
          python -m alembic heads
          python -m pip check
      - name: Run tests
        run: |
          set -o pipefail
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/security_test.py \
            --ignore=tests/fault_injection_test.py \
            --basetemp=.test_tmp/pytest 2>&1 | tee pytest_output.txt
      - name: Surface test failures
        if: failure()
        run: |
          echo "=== Failed tests ==="
          grep -E "FAILED|ERROR" pytest_output.txt | head -30 || true
          echo "=== Last 30 lines ==="
          tail -30 pytest_output.txt

  # Docker build check
  docker:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image (CPU-only, no GPU deps)
        run: docker build --build-arg INSTALL_GPU_DEPS=false -t qqassistant-backend ./backend
      - name: Build frontend image
        run: docker build -t qqassistant-frontend .
