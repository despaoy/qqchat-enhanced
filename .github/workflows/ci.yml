name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Frontend checks
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm ts-check
      - run: pnpm lint
      - run: pnpm build

  # Backend checks
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install CPU-only dependencies
        run: |
          python -m pip install --upgrade pip
          # Install PyTorch CPU version first (CI has no GPU)
          pip install torch==2.4.1 torchvision==0.19.1 torchaudio==2.4.1 \
            --index-url https://download.pytorch.org/whl/cpu
          # Install remaining deps (skip GPU-only vllm)
          grep -v -E "^(vllm|torch==|torchvision==|torchaudio==)" requirements.txt > requirements-ci.txt
          pip install -r requirements-ci.txt
      - name: Syntax check
        run: |
          python -m py_compile app/main.py
          python -m py_compile app/config.py
          python -m py_compile db/adapter.py
          python -m py_compile db/pg_database.py
          python -m py_compile db/database.py
          python -m py_compile inference/vllm_client.py
          python -m py_compile cache/redis_client.py
          python -m py_compile cache/semantic_cache.py
          python -m py_compile cache/message_queue.py
          python -m py_compile infra/circuit_breaker.py
          python -m py_compile interfaces/__init__.py
      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short 2>/dev/null || echo "No tests or test failures (non-blocking)"

  # Docker build check
  docker:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t qqassistant-backend ./backend
      - name: Build frontend image
        run: docker build -t qqassistant-frontend .
